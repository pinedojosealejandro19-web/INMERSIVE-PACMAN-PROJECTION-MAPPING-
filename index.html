<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>NES Gamepad</title>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #111;
      color: #fff;
      font-family: system-ui, Arial, sans-serif;
      overflow: hidden;
    }

    .rotate {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      z-index: 10;
      font-size: 20px;
      text-align: center;
      padding: 20px;
    }

    @media (orientation: landscape) {
      .rotate {
        display: none;
      }
    }

    .app {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .top {
      display: flex;
      gap: 10px;
      padding: 10px;
    }

    input, button {
      font-size: 16px;
      padding: 10px;
      border-radius: 10px;
      border: none;
    }

    .pad {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      align-items: center;
      justify-items: center;
    }

    .dpad {
      width: min(40vh, 40vw);
      height: min(40vh, 40vw);
      position: relative;
    }

    .dpad button {
      position: absolute;
      background: #333;
      color: #fff;
      border: none;
      font-size: 3vh;
      border-radius: 1vh;
    }

    .up { top: 0; left: 30%; width: 40%; height: 25%; }
    .down { bottom: 0; left: 30%; width: 40%; height: 25%; }
    .left { left: 0; top: 30%; width: 25%; height: 40%; }
    .right { right: 0; top: 30%; width: 25%; height: 40%; }

    .mid {
      display: flex;
      gap: 3vh;
    }

    .mid button {
      width: min(18vh, 18vw);
      height: min(6vh, 6vw);
      background: #555;
      color: #fff;
      border-radius: 3vh;
    }

    .ab {
      display: flex;
      gap: 4vh;
      align-items: center;
      justify-content: center;
    }

    .ab button {
      width: min(14vh, 14vw);
      height: min(14vh, 14vw);
      border-radius: 50%;
      background: #e11d2e;
      color: #fff;
      font-size: 4vh;
      border: none;
    }

    .fs-btn {
      position: fixed;
      bottom: 10px;
      right: 10px;
      z-index: 999;
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(255,255,255,0.12);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.15);
    }
  </style>
</head>
<body>

  <div class="rotate">Rotate phone to landscape</div>

  <div class="app">
    <div class="top">
      <input id="room" placeholder="ROOM" />
      <button id="join">JOIN</button>
    </div>

    <div class="pad">
      <div class="dpad">
        <button id="up" class="up">▲</button>
        <button id="down" class="down">▼</button>
        <button id="left" class="left">◀</button>
        <button id="right" class="right">▶</button>
      </div>

      <div class="mid">
        <button id="select">SELECT</button>
        <button id="start">START</button>
      </div>

      <div class="ab">
        <button id="b">B</button>
        <button id="a">A</button>
      </div>
    </div>
  </div>

  <button id="fullscreenBtn" class="fs-btn">FULLSCREEN</button>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAjUTUVx401HS9qrTmzab27nUiLvvMkfxQ",
      authDomain: "pacman-86c4e.firebaseapp.com",
      databaseURL: "https://pacman-86c4e-default-rtdb.firebaseio.com",
      projectId: "pacman-86c4e",
      storageBucket: "pacman-86c4e.firebasestorage.app",
      messagingSenderId: "1044337774275",
      appId: "1:1044337774275:web:362fcd603a473c04e95c76"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }

    const db = firebase.database();
    let ref = null;

    document.getElementById("join").onclick = () => {
      const room = (document.getElementById("room").value || "ABCD").toUpperCase();
      ref = db.ref("rooms/" + room + "/input");
      ref.set({ action: "connected", t: Date.now() });
    };

    function send(action) {
      if (!ref) {
        alert("Join first");
        return;
      }
      ref.set({ action, t: Date.now() });
    }

    ["up", "down", "left", "right", "a", "b", "start", "select"].forEach(id => {
      const el = document.getElementById(id);

      el.onclick = () => send(id);

      el.addEventListener("touchstart", (e) => {
        e.preventDefault();
        send(id);
      }, { passive: false });
    });

    function enterFullscreen() {
      const el = document.documentElement;

      if (el.requestFullscreen) el.requestFullscreen();
      else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      else if (el.msRequestFullscreen) el.msRequestFullscreen();
    }

    document.body.addEventListener("touchstart", () => {
      enterFullscreen();
    }, { once: true });

    document.getElementById("fullscreenBtn").onclick = enterFullscreen;
  </script>
</body>
</html>
