<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INMERSIVE PACMAN project</title>
  <style>
    body {
      background-color: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
      position: relative;
    }

    canvas {
      border: 2px solid #ffffff1e;
      background-color: #02111f;
      image-rendering: pixelated;
    }

    /* THE HUD */
    .hud {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 20;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      background: rgba(0, 0, 0, 0.7);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 10px 12px;
      color: white;
      font-family: system-ui, Arial, sans-serif;
      font-size: 14px;
    }

    .hud input, .hud button {
      font-size: 14px;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08);
      color: white;
      outline: none;
    }

    /* THE QR CODE TAG */
    .qr-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .qr-frame {
      width: 140px; 
      height: 140px; 
      padding: 8px;
      background: white;
      border: 4px solid #00dbff; /* Neon blue */
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(0, 219, 255, 0.5);
    }

    .qr-label {
      color: white;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      font-weight: bold;
      text-transform: uppercase;
      text-shadow: 2px 2px 4px #000;
    }
  </style>
</head>
<body>

  <div class="qr-container">
    <img src="Images/BGS/QR CODE GAMEPAD.jpg" alt="Gamepad QR" class="qr-frame">
    <span class="qr-label">Scan to Play</span>
  </div>

  <div class="hud">
    <input id="roomInput" placeholder="ROOM (ABCD)" maxlength="12" />
    <button id="connectRoomBtn">Connect</button>
    <span id="roomStatus" class="status">Waiting…</span>
  </div>

  <canvas id="game"></canvas>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>

  <script src="game.js"></script>

</body>
</html>
